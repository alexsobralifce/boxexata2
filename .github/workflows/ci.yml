name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Check formatting (Ruff)
      run: ruff format --check src/ tests/

    - name: Lint (Ruff)
      run: ruff check src/ tests/

    - name: Type check (Mypy)
      run: mypy src/ --strict

    - name: Run unit tests and check coverage (Pytest)
      run: pytest -m "not integration" --cov=src/application --cov-fail-under=80
