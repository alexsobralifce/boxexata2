services:
  # Serviço do Chatbot (ExataBot)
  exatabot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exatabot
    restart: always
    ports:
      - "8000:8000"
    environment:
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-exatabot}
      - BOT_NAME=${BOT_NAME:-Ana}
      - BUSINESS_HOURS_START=${BUSINESS_HOURS_START:-8}
      - BUSINESS_HOURS_END=${BUSINESS_HOURS_END:-18}
      - SITE_BASE_URL=${SITE_BASE_URL:-https://www.exataservicos.net}
      - CACHE_TTL_MINUTES=${CACHE_TTL_MINUTES:-30}
      - RESULTS_PAGE_SIZE=${RESULTS_PAGE_SIZE:-3}
      - MAX_PHOTOS_PER_PROPERTY=${MAX_PHOTOS_PER_PROPERTY:-3}
      - LLM_PROVIDER=${LLM_PROVIDER:-regex}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SESSION_STORE_TYPE=${SESSION_STORE_TYPE:-redis}
      - CACHE_TYPE=${CACHE_TYPE:-redis}
      - MESSAGE_LOG_ENABLED=${MESSAGE_LOG_ENABLED:-true}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/exatabot}
    depends_on:
      evolution-api:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_started
    networks:
      - exatabot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Serviço do Gateway de WhatsApp (Evolution API)
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      # URL externa ou interna de acesso
      - SERVER_URL=http://localhost:8080
      # Chave de API global para gerenciar instâncias
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      # Configurações de webhook globais
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://exatabot:8000/webhook
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
      # Limite de conexões de instâncias simultâneas
      - QRCODE_LIMIT=10
      # Persistência padrão SQLite
      - DATABASE_ENABLED=false
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - exatabot-network

  # Serviço do Redis (Cache e Session Store)
  redis:
    image: redis:7-alpine
    container_name: exatabot-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - exatabot-network

  # Serviço do Banco de Dados PostgreSQL (Fase 8A)
  postgres:
    image: postgres:16-alpine
    container_name: exatabot-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=exatabot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - exatabot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  evolution_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  exatabot-network:
    driver: bridge
